<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Post-Therapy Decision Framework</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: 0 auto; padding: 20px; background-color: #f4f7f6; }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 10px; }
        p.subtitle { text-align: center; color: #7f8c8d; margin-bottom: 30px; }
        .pillar { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px; }
        h2 { color: #2980b9; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; margin-top: 0; }
        .question { margin-bottom: 20px; }
        label { display: block; font-weight: 500; margin-bottom: 8px; }
        .options { display: flex; gap: 15px; flex-wrap: wrap; }
        .option-label { font-weight: normal; background: #f8f9fa; padding: 8px 15px; border-radius: 4px; border: 1px solid #ddd; cursor: pointer; transition: 0.2s; }
        .option-label:hover { background: #e9ecef; }
        input[type="radio"] { margin-right: 8px; }
        button { display: block; width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #2ecc71; }
        #result-box { display: none; margin-top: 30px; padding: 25px; border-radius: 8px; font-size: 1.1em; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .result-title { font-size: 1.5em; font-weight: bold; margin-bottom: 10px; }
        /* Result Colors */
        .stay { background: #d4edda; color: #155724; border: 2px solid #c3e6cb; }
        .calm { background: #cce5ff; color: #004085; border: 2px solid #b8daff; }
        .immediate { background: #f8d7da; color: #721c24; border: 2px solid #f5c6cb; }
        .stepping { background: #fff3cd; color: #856404; border: 2px solid #ffeeba; }
        .mixed { background: #e2e3e5; color: #383d41; border: 2px solid #d6d8db; }
    </style>
</head>
<body>

    <h1>Post-Therapy Decision Framework</h1>
    <p class="subtitle">Complete this diagnostic to evaluate your next career step after burnout recovery.</p>

    <form id="decisionForm">
        <!-- Pillar 1 -->
        <div class="pillar">
            <h2>Pillar 1: The "New Reality" Diagnostic</h2>
            <p><em>Rate from 1 (Strongly Disagree) to 5 (Strongly Agree)</em></p>
            
            <div class="question">
                <label>1. I can successfully log off at the end of my shift without feeling anxious.</label>
                <div class="options">
                    <label class="option-label"><input type="radio" name="p1_q1" value="1" required> 1</label>
                    <label class="option-label"><input type="radio" name="p1_q1" value="2"> 2</label>
                    <label class="option-label"><input type="radio" name="p1_q1" value="3"> 3</label>
                    <label class="option-label"><input type="radio" name="p1_q1" value="4"> 4</label>
                    <label class="option-label"><input type="radio" name="p1_q1" value="5"> 5</label>
                </div>
            </div>
            <div class="question">
                <label>2. I can interact with leadership without a lingering sense of resentment.</label>
                <div class="options">
                    <label class="option-label"><input type="radio" name="p1_q2" value="1" required> 1</label>
                    <label class="option-label"><input type="radio" name="p1_q2" value="2"> 2</label>
                    <label class="option-label"><input type="radio" name="p1_q2" value="3"> 3</label>
                    <label class="option-label"><input type="radio" name="p1_q2" value="4"> 4</label>
                    <label class="option-label"><input type="radio" name="p1_q2" value="5"> 5</label>
                </div>
            </div>
            <div class="question">
                <label>3. The systemic issues that caused my burnout are absent in this new role.</label>
                <div class="options">
                    <label class="option-label"><input type="radio" name="p1_q3" value="1" required> 1</label>
                    <label class="option-label"><input type="radio" name="p1_q3" value="2"> 2</label>
                    <label class="option-label"><input type="radio" name="p1_q3" value="3"> 3</label>
                    <label class="option-label"><input type="radio" name="p1_q3" value="4"> 4</label>
                    <label class="option-label"><input type="radio" name="p1_q3" value="5"> 5</label>
                </div>
            </div>
            <div class="question">
                <label>4. I do not feel sidelined or punished for stepping down from management.</label>
                <div class="options">
                    <label class="option-label"><input type="radio" name="p1_q4" value="1" required> 1</label>
                    <label class="option-label"><input type="radio" name="p1_q4" value="2"> 2</label>
                    <label class="option-label"><input type="radio" name="p1_q4" value="3"> 3</label>
                    <label class="option-label"><input type="radio" name="p1_q4" value="4"> 4</label>
                    <label class="option-label"><input type="radio" name="p1_q4" value="5"> 5</label>
                </div>
            </div>
        </div>

        <!-- Pillar 2 -->
        <div class="pillar">
            <h2>Pillar 2: The Ethics Checklist</h2>
            
            <div class="question">
                <label>1. Is the company still actively violating labor codes or internal policies?</label>
                <div class="options">
                    <label class="option-label"><input type="radio" name="p2_q1" value="Yes" required> Yes</label>
                    <label class="option-label"><input type="radio" name="p2_q1" value="No"> No</label>
                </div>
            </div>
            <div class="question">
                <label>2. Does staying require me to compromise my personal ethics?</label>
                <div class="options">
                    <label class="option-label"><input type="radio" name="p2_q2" value="Yes" required> Yes</label>
                    <label class="option-label"><input type="radio" name="p2_q2" value="No"> No</label>
                </div>
            </div>
            <div class="question">
                <label>3. Am I implicitly giving them a "pass" for behavior that damaged my health?</label>
                <div class="options">
                    <label class="option-label"><input type="radio" name="p2_q3" value="Yes" required> Yes</label>
                    <label class="option-label"><input type="radio" name="p2_q3" value="No"> No</label>
                </div>
            </div>
        </div>

        <!-- Pillar 3 -->
        <div class="pillar">
            <h2>Pillar 3: Career & Energy Alignment</h2>
            
            <div class="question">
                <label>1. When I think about my daily tasks in this non-managerial role:</label>
                <div class="options">
                    <label class="option-label"><input type="radio" name="p3_q1" value="A" required> A) I feel relief and steady engagement.</label>
                    <label class="option-label"><input type="radio" name="p3_q1" value="B"> B) I feel bored, underutilized, or hiding out.</label>
                </div>
            </div>
            <div class="question">
                <label>2. When I look at the market for SOC/Cyber professionals right now:</label>
                <div class="options">
                    <label class="option-label"><input type="radio" name="p3_q2" value="A" required> A) I want a fresh start; it sounds liberating.</label>
                    <label class="option-label"><input type="radio" name="p3_q2" value="B"> B) The thought of interviewing is exhausting.</label>
                </div>
            </div>
        </div>

        <button type="submit">Calculate My Recommended Path</button>
    </form>

    <div id="result-box">
        <div class="result-title" id="res-title"></div>
        <div id="res-desc"></div>
    </div>
